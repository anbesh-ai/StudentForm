<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Admin{% endblock %} — Toh Tech</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">
</head>
<body class="admin-body">

    <div class="admin-topbar">
        <div class="brand">Toh Tech <span style="font-size:0.7rem; opacity:0.8;">Admin</span></div>
        {% if session.get('is_admin') %}
        <a href="{{ url_for('admin_logout') }}" class="logout-link">Log out</a>
        {% endif %}
    </div>
    <div style="background-color:#f3f4f6; padding:10px 28px; border-bottom:1px solid #d1d5db; display:flex; gap:20px;">
    <a href="{{ url_for('show_users') }}" style="text-decoration:none; color:#1B3A5C; font-weight:500;">Users</a>
    <a href="{{ url_for('add_user') }}" style="text-decoration:none; color:#1B3A5C; font-weight:500;">Add User</a>
</div>

    <div class="admin-wrapper">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="admin-flash {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>

</body>
</html>
